server:
  port: 8888
spring:
  application:
    name: rest-api
  jpa:
    hibernate:
      ddl-auto: none
    #open-in-view: false
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 500MB
      max-request-size: 600MB
logging:
  level:
    root: info
springdoc:
  paths-to-match:
  - /api/**
  swagger-ui:
    use-root-path: true

cors:
  originPatterns: http://localhost:8080,http://localhost:3000
file:
  upload-dir: /home/noki/Documentos/api/upload
security:
  jwt:
    token:
      secret-key: 53cr37
      expire-length: 3600000